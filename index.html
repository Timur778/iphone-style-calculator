<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="calculator">
        <div class="top">
          <div class="display">0</div>
        </div>
        <div class="bottom">
          <button class="backspace elements"><</button>
          <button class="clear elements">C</button>
          <button class="percent elements">%</button>
          <button class="operation elements special">/</button>
          <button class="number elements">7</button>
          <button class="number elements">8</button>
          <button class="number elements">9</button>
          <button class="operation elements special">x</button>
          <button class="number elements">4</button>
          <button class="number elements">5</button>
          <button class="number elements">6</button>
          <button class="operation elements special">-</button>
          <button class="number elements">1</button>
          <button class="number elements">2</button>
          <button class="number elements">3</button>
          <button class="operation elements special">+</button>
          <button class="toggle elements">+/-</button>
          <button class="number elements">0</button>
          <button class="decimal elements">.</button>
          <button class="equals elements special">=</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/script.js"></script>
    <!-- <script type="module" src="./js/tests.js"></script> -->
  </body>
</html>
